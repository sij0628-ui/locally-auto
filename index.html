<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">Dark Mode</button>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div class="lotto-numbers">
            <!-- Numbers will be generated here -->
        </div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <div class="container contact-form">
        <h2>Partnership Inquiry</h2>
        <form action="https://formspree.io/f/mreozoqv" method="POST">
            <div class="form-group">
                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" required placeholder="Tell us about your partnership proposal..."></textarea>
            </div>
            <button type="submit" id="submit-btn">Send Inquiry</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>

</html>
